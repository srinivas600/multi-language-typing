name: multi_language_typing
description: Multi Language Typing - A powerful Indian language typing and document creation app for Android

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_colorpicker: ^1.0.3
  iconsax: ^0.0.8
  
  # State Management
  provider: ^6.1.1
  
  # File & Storage
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  
  # PDF & Export
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Utilities
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
